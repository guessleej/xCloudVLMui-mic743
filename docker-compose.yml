###############################################################################
# docker-compose.yml — xCloudVLMui Platform [bot-dgx]
#
# ════════════════════════════════════════════════════════════════════
# 目標硬體：Advantech NVIDIA DGX
# SoM     ：NVIDIA DGX
# 架構    ：x86_64 (amd64)
# GPU     ：NVIDIA Blackwell — 2,560 CUDA Cores + 96 Tensor Cores (Gen5)
# AI 效能 ：2,070 FP4 TFLOPs
# 記憶體  ：512 GB DDR5 ECC
# 儲存    ：1 TB NVMe SSD
# 作業系統：Ubuntu 22.04 (24.04)
# CUDA    ：12.6 + TensorRT 10.x + cuDNN 9.x
# ════════════════════════════════════════════════════════════════════
#
# ⚠️  此為 bot-dgx 完全獨立部署，與其他實例完全隔離：
#     - project name   : xcloudvlmui-dgx
#     - container 前綴 : dgx-
#     - volume 前綴    : dgx-
#     - network        : dgx-xcloud-net
#
# Port 配置（bot-dgx 專用）：
#   nginx    → 8780:80    ← 主要入口
#   backend  → 8101:8000
#   frontend → 3200:3000
#   llama-cpp→ 18180:8080
#   vlm-webui→ 8190:8090
#   cadvisor → 8191:8080
#   mosquitto→ 1884:1883 / 9002:9001
#
# 快速啟動：
#   make setup && make up
###############################################################################

name: xcloudvlmui-dgx

# ── 共用環境變數 ─────────────────────────────────────────────────────
# DGX 使用容器內 llama-cpp CUDA（非 host Ollama）
x-llm-env: &llm-env
  LLM_BASE_URL:    http://172.17.0.1:11434
  LLM_MODEL:       gemma4:e4b
  LLM_CTX_SIZE:    "131072"           # 128K context — 128GB RAM 完全支援
  LLM_MAX_TOKENS:  "4096"
  LLM_TEMPERATURE: "0.1"
  EMBED_MODEL_URL: http://172.17.0.1:11434
  EMBED_MODEL:     nomic-embed-text
  VLM_MODEL:       qwen3-vl:30b

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ──────────────────────────────────────────────────────────────────
  # [1] model-init — 從 HuggingFace 下載 GGUF 模型
  #
  # DGX 有 128GB unified memory，可使用較大量化（Q4_K_M 或更高）
  # 建議模型：gemma-4-e4b-it-Q4_K_M.gguf (~4 GB)
  # 大模型選項：gemma-4-e4b-it-Q6_K.gguf (~6 GB)
  # ──────────────────────────────────────────────────────────────────
  model-init:
    image: busybox:latest
    container_name: dgx-model-init
    command: ["sh", "-c", "echo '[dgx] Ollama 模式：跳過模型下載' && exit 0"]
    restart: "no"
    networks:
      - dgx-xcloud-net

  # ──────────────────────────────────────────────────────────────────
  # [2] mosquitto — Eclipse Mosquitto MQTT Broker
  # ──────────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: dgx-mqtt
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "1884:1883"
      - "9002:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - dgx-mosquitto-data:/mosquitto/data
      - dgx-mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t 'health/ping' -m 'ping' -q 0 2>/dev/null && echo ok || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s
    networks:
      - dgx-xcloud-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [3] llama-cpp — Blackwell GPU CUDA 12.6 加速推論
  #
  # NVIDIA DGX 推論設定：
  #   --n-gpu-layers 99   → 全部 layer 上 GPU（128GB 完全夠用）
  #   --flash-attn        → Blackwell Tensor Core Gen5 FlashAttention
  #   --ctx-size 131072   → 128K context window
  #   --threads 14        → Neoverse V3AE × 14 核全用
  #   --mlock             → 鎖定模型記憶體，避免 swap
  #
  # 映像選擇：
  #   - ghcr.io/ggerganov/llama.cpp:server-cuda  (多架構 CUDA 通用)
  #   - dustynv/llama.cpp:r38.1.0               (待 JetPack 7.x 映像釋出)
  # ──────────────────────────────────────────────────────────────────
  llama-cpp:
    image: python:3.11-slim
    container_name: dgx-llama-cpp-stub
    restart: unless-stopped
    command:
      - python3
      - -m
      - http.server
      - "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/')" 2>/dev/null && echo ok
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "18180:8080"
    networks:
      - dgx-xcloud-net

  # ──────────────────────────────────────────────────────────────────
  # [4] vlm-webui — 即時視覺分析 WebUI（WebRTC / RealSense）
  # ──────────────────────────────────────────────────────────────────
  vlm-webui:
    build:
      context:    ./vlm-webui
      dockerfile: Dockerfile.vlm.dgx
      platforms:
        - linux/arm64
    image: xcloudvlmui-dgx-vlm-webui:latest
    container_name: dgx-vlm-webui
    restart: unless-stopped
    environment:
      <<: *llm-env
      APP_NAME: "xCloudVLMui VLM WebUI [bot-dgx]"
      CAMERA_DEVICE: "2"
    depends_on:
      llama-cpp:
        condition: service_healthy
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/video2:/dev/video2
      - /dev/video3:/dev/video3
      - /dev/video4:/dev/video4
      - /dev/video5:/dev/video5
      - /dev/video6:/dev/video6
      - /dev/video7:/dev/video7
    ports:
      - "8190:8090"
    networks:
      - dgx-xcloud-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [5] backend — FastAPI 中介層 + RAG + MQTT + 模型管理
  # ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    image: xcloudvlmui-dgx-backend:latest
    container_name: dgx-backend
    restart: unless-stopped
    environment:
      <<: *llm-env
      APP_NAME:           "xCloudVLMui Platform [bot-dgx]"
      VLM_WEBUI_URL:      http://vlm-webui:8090
      DATABASE_URL:       sqlite+aiosqlite:////data/xcloudvlm.db
      CHROMA_PERSIST_DIR: /data/chroma
      ALLOWED_ORIGINS:    '["http://localhost:3200","http://localhost:8780","http://localhost"]'
      DEBUG:              "false"
      MQTT_BROKER_HOST:   mosquitto
      MQTT_BROKER_PORT:   "1883"
      MQTT_ENABLED:       "true"
      SECRET_KEY:         ${SECRET_KEY:-change-me-dgx-production}
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - dgx-backend-data:/data
      - ./backend/uploads:/app/uploads
    ports:
      - "8101:8000"
    depends_on:
      llama-cpp:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 30s
    networks:
      - dgx-xcloud-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [6] frontend — Next.js 儀表板
  # ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
      args:
        - NEXT_PUBLIC_API_URL=https://${HOST_IP:-localhost}:${HTTPS_PORT:-8743}
        - BACKEND_URL=http://backend:8000
    image: xcloudvlmui-dgx-frontend:latest
    container_name: dgx-frontend
    restart: unless-stopped
    environment:
      - NEXTAUTH_URL=https://${HOST_IP:-localhost}:${HTTPS_PORT:-8743}
      - NEXT_PUBLIC_API_URL=https://${HOST_IP:-localhost}:${HTTPS_PORT:-8743}
      - NEXT_PUBLIC_WS_URL=                         # 空白 → camera-stream.tsx 自動推導
      - BACKEND_URL=http://backend:8000             # Next.js server-side rewrite（/backend-api/*）
      - NODE_ENV=production
    env_file:
      - path: ./frontend/.env.local
        required: false
    ports:
      - "3200:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 15s
    networks:
      - dgx-xcloud-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [7] nginx — 反向代理（統一入口）
  # ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: dgx-nginx
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "8780:80"
      - "8743:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s
    networks:
      - dgx-xcloud-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [8] cadvisor — 容器資源監控（含 Blackwell GPU 統計）
  # ──────────────────────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: dgx-cadvisor
    platform: linux/arm64
    restart: unless-stopped
    privileged: true
    ports:
      - "8191:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--housekeeping_interval=15s"
      - "--max_housekeeping_interval=20s"
      - "--event_storage_event_limit=default=0"
      - "--event_storage_age_limit=default=0"
      - "--disable_metrics=advtcp,cpuset,hugetlb,memory_numa,process,referenced_memory,resctrl,sched,tcp,udp"
      - "--store_container_labels=false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s
    networks:
      - dgx-xcloud-net
    logging: *default-logging

# ── Named Volumes（獨立於其他 bot）────────────────────────────────────
volumes:
  dgx-model-data:
    driver: local
  dgx-backend-data:
    driver: local
  dgx-mosquitto-data:
    driver: local
  dgx-mosquitto-log:
    driver: local

# ── Network（獨立隔離）────────────────────────────────────────────────
networks:
  dgx-xcloud-net:
    name: dgx-xcloud-net
    driver: bridge
