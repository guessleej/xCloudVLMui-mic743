###############################################################################
# docker-compose.yml — xCloudVLMui Platform [bot-mic743]
#
# 目標硬體：Advantech MIC-743
# SoM     ：NVIDIA Jetson Orin NX 16GB（或 Orin AGX）
# OS      ：NVIDIA JetPack 7.1 (L4T R38.x)
# 架構    ：ARM64 (aarch64)
# 加速    ：CUDA 12.6 · TensorRT 10.x · cuDNN 9.x
#
# Port 配置（bot-mic743 專用，不與其他實例衝突）：
#   nginx    → 8780:80    ← 主要入口
#   backend  → 8101:8000
#   frontend → 3200:3000
#   llama-cpp→ 18180:8080
#   vlm-webui→ 8190:8090
#   cadvisor → 8191:8080
#   mosquitto→ 1884/9002
#
# 快速啟動：
#   make setup && make up
###############################################################################

name: xcloudvlmui-mic743

# ── 共用環境變數 ─────────────────────────────────────────────────────
x-llm-env: &llm-env
  LLM_BASE_URL:    http://llama-cpp:8080
  LLM_MODEL:       gemma-4-e4b-it
  LLM_CTX_SIZE:    "65536"
  LLM_MAX_TOKENS:  "4096"
  LLM_TEMPERATURE: "0.1"
  EMBED_MODEL_URL: http://llama-cpp:8080
  EMBED_MODEL:     nomic-embed-text

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ──────────────────────────────────────────────────────────────────
  # [1] model-init — 從 HuggingFace 下載 GGUF 模型
  #     MIC-743 記憶體較少，使用 Q3_K_S 更小量化
  # ──────────────────────────────────────────────────────────────────
  model-init:
    image: python:3.11-slim
    container_name: mic743-model-init
    platform: linux/arm64
    volumes:
      - model-data:/models
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - MODEL_REPO=${MODEL_REPO:-bartowski/google_gemma-4-e4b-it-GGUF}
      - MODEL_FILE=${MODEL_FILE:-gemma-4-e4b-it-Q3_K_S.gguf}
    command: >
      /bin/bash -c "
        MODEL=/models/$${MODEL_FILE} ;
        if [ -f \"$$MODEL\" ]; then echo '[model-init] already exists, skip.'; exit 0; fi ;
        pip install -q huggingface-hub ;
        python3 -c \"
          from huggingface_hub import hf_hub_download
          import os, shutil
          p = hf_hub_download(repo_id=os.environ['MODEL_REPO'],
                              filename=os.environ['MODEL_FILE'],
                              token=os.environ.get('HF_TOKEN') or None)
          shutil.move(p, '/models/' + os.environ['MODEL_FILE'])
          print('[model-init] Done')
        \"
      "
    restart: "no"
    networks: [mic743-net]

  # ──────────────────────────────────────────────────────────────────
  # [2] mosquitto — Eclipse MQTT Broker
  # ──────────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mic743-mqtt
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "1884:1883"
      - "9002:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mic743-mosquitto-data:/mosquitto/data
      - mic743-mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t health -m ping -q 0 2>/dev/null && echo ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [mic743-net]
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [3] llama-cpp — CUDA 加速推論（JetPack 7.1, CUDA 12.6）
  #     JetPack 7.1 對應 L4T R38.x，需使用相容映像
  #     備選：dustynv/llama.cpp:r38.1.0（待官方釋出後更新）
  # ──────────────────────────────────────────────────────────────────
  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    container_name: mic743-llama-cpp
    platform: linux/arm64
    runtime: nvidia
    restart: unless-stopped
    depends_on:
      model-init:
        condition: service_completed_successfully
    volumes:
      - model-data:/models:ro
    ports:
      - "18180:8080"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command: >
      --model /models/${MODEL_FILE:-gemma-4-e4b-it-Q3_K_S.gguf}
      --host 0.0.0.0 --port 8080
      --ctx-size 65536
      --n-gpu-layers 99
      --threads 6
      --flash-attn
      --log-disable
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks: [mic743-net]
    logging: *default-logging
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ──────────────────────────────────────────────────────────────────
  # [4] vlm-webui — 即時視覺分析 WebUI（WebRTC）
  # ──────────────────────────────────────────────────────────────────
  vlm-webui:
    build:
      context: ./vlm-webui
      dockerfile: Dockerfile
      platforms: [linux/arm64]
    image: xcloudvlmui/vlm-webui:mic743
    container_name: mic743-vlm-webui
    restart: unless-stopped
    environment:
      <<: *llm-env
    depends_on:
      llama-cpp:
        condition: service_healthy
    ports:
      - "8190:8090"
    networks: [mic743-net]
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [5] backend — FastAPI 中介層
  # ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      platforms: [linux/arm64]
    image: xcloudvlmui/backend:mic743
    container_name: mic743-backend
    restart: unless-stopped
    environment:
      <<: *llm-env
      DATABASE_URL: sqlite+aiosqlite:////data/app.db
      CHROMA_PATH:  /data/chroma
      UPLOAD_DIR:   /data/uploads
      OCR_ENGINE:   vlm
      SECRET_KEY:   ${SECRET_KEY:-change-me-mic743}
      MQTT_HOST:    mosquitto
      MQTT_PORT:    "1883"
    depends_on:
      llama-cpp:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    volumes:
      - mic743-backend-data:/data
    ports:
      - "8101:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [mic743-net]
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [6] frontend — Next.js 儀表板
  # ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      platforms: [linux/arm64]
      args:
        NEXTAUTH_URL:        http://localhost:8780
        NEXT_PUBLIC_API_URL: http://localhost:8101
        NEXT_PUBLIC_WS_URL:  ws://localhost:8101
    image: xcloudvlmui/frontend:mic743
    container_name: mic743-frontend
    restart: unless-stopped
    environment:
      NEXTAUTH_URL:         ${NEXTAUTH_URL:-http://localhost:8780}
      NEXTAUTH_SECRET:      ${NEXTAUTH_SECRET:-change-me}
      NEXT_PUBLIC_API_URL:  http://localhost:8101
      NEXT_PUBLIC_WS_URL:   ws://localhost:8101
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3200:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [mic743-net]
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [7] nginx — 反向代理
  # ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: mic743-nginx
    platform: linux/arm64
    restart: unless-stopped
    depends_on: [frontend, backend]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8780:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks: [mic743-net]
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [8] cadvisor — 容器資源監控
  # ──────────────────────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: mic743-cadvisor
    platform: linux/arm64
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8191:8080"
    networks: [mic743-net]
    logging: *default-logging

networks:
  mic743-net:
    name: mic743-xcloud-net
    driver: bridge

volumes:
  model-data:
    name: mic743-model-data
  mic743-mosquitto-data:
  mic743-mosquitto-log:
  mic743-backend-data:
