###############################################################################
# docker-compose.yml — xCloudVLMui Platform [bot-mic743]
#
# ════════════════════════════════════════════════════════════════════
# 目標硬體：Advantech MIC-743-AT
# SoM     ：NVIDIA Jetson Thor AGX
# 架構    ：ARM64 (aarch64) — ARM Neoverse V3AE × 14 核
# GPU     ：NVIDIA Blackwell — 2,560 CUDA Cores + 96 Tensor Cores (Gen5)
# AI 效能 ：2,070 FP4 TFLOPs
# 記憶體  ：128 GB LPDDR5X Unified Memory（CPU + GPU 共享）
# 儲存    ：1 TB NVMe SSD
# 作業系統：Ubuntu 22.04 (L4T R38.x)
# CUDA    ：12.6 + TensorRT 10.x + cuDNN 9.x
# ════════════════════════════════════════════════════════════════════
#
# ⚠️  此為 bot-mic743 完全獨立部署，與其他實例完全隔離：
#     - project name   : xcloudvlmui-mic743
#     - container 前綴 : mic743-
#     - volume 前綴    : mic743-
#     - network        : mic743-xcloud-net
#
# Port 配置（bot-mic743 專用）：
#   nginx    → 8780:80    ← 主要入口
#   backend  → 8101:8000
#   frontend → 3200:3000
#   llama-cpp→ 18180:8080
#   vlm-webui→ 8190:8090
#   cadvisor → 8191:8080
#   mosquitto→ 1884:1883 / 9002:9001
#
# 快速啟動：
#   make setup && make up
###############################################################################

name: xcloudvlmui-mic743

# ── 共用環境變數 ─────────────────────────────────────────────────────
# MIC-743 使用容器內 llama-cpp CUDA（非 host Ollama）
x-llm-env: &llm-env
  LLM_BASE_URL:    http://llama-cpp:8080
  LLM_MODEL:       gemma-4-e4b-it
  LLM_CTX_SIZE:    "131072"           # 128K context — 128GB RAM 完全支援
  LLM_MAX_TOKENS:  "4096"
  LLM_TEMPERATURE: "0.1"
  EMBED_MODEL_URL: http://llama-cpp:8080
  EMBED_MODEL:     nomic-embed-text

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ──────────────────────────────────────────────────────────────────
  # [1] model-init — 從 HuggingFace 下載 GGUF 模型
  #
  # MIC-743 有 128GB unified memory，可使用較大量化（Q4_K_M 或更高）
  # 建議模型：gemma-4-e4b-it-Q4_K_M.gguf (~4 GB)
  # 大模型選項：gemma-4-e4b-it-Q6_K.gguf (~6 GB)
  # ──────────────────────────────────────────────────────────────────
  model-init:
    image: python:3.11-slim
    container_name: mic743-model-init
    platform: linux/arm64
    volumes:
      - mic743-model-data:/models
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - MODEL_REPO=${MODEL_REPO:-bartowski/google_gemma-4-e4b-it-GGUF}
      - MODEL_FILE=${MODEL_FILE:-gemma-4-e4b-it-Q4_K_M.gguf}
      - HF_HUB_DISABLE_PROGRESS_BARS=0
    command: >
      /bin/bash -c "
        MODEL=/models/$${MODEL_FILE} ;
        if [ -f \"$$MODEL\" ]; then
          echo '[mic743 model-init] Model exists, skip download.' ;
          exit 0 ;
        fi ;
        echo '[mic743 model-init] Installing huggingface-hub...' ;
        pip install -q huggingface-hub ;
        echo '[mic743 model-init] Downloading model...' ;
        python3 -c \"
          from huggingface_hub import hf_hub_download
          import os, shutil
          path = hf_hub_download(
            repo_id=os.environ['MODEL_REPO'],
            filename=os.environ['MODEL_FILE'],
            token=os.environ.get('HF_TOKEN') or None,
          )
          dst = '/models/' + os.environ['MODEL_FILE']
          shutil.move(path, dst)
          print('[mic743 model-init] Done:', dst)
        \"
      "
    restart: "no"
    networks:
      - mic743-xcloud-net

  # ──────────────────────────────────────────────────────────────────
  # [2] mosquitto — Eclipse Mosquitto MQTT Broker
  # ──────────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mic743-mqtt
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "1884:1883"
      - "9002:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mic743-mosquitto-data:/mosquitto/data
      - mic743-mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t 'health/ping' -m 'ping' -q 0 2>/dev/null && echo ok || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s
    networks:
      - mic743-xcloud-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [3] llama-cpp — Blackwell GPU CUDA 12.6 加速推論
  #
  # Jetson Thor AGX 推論設定：
  #   --n-gpu-layers 99   → 全部 layer 上 GPU（128GB 完全夠用）
  #   --flash-attn        → Blackwell Tensor Core Gen5 FlashAttention
  #   --ctx-size 131072   → 128K context window
  #   --threads 14        → Neoverse V3AE × 14 核全用
  #   --mlock             → 鎖定模型記憶體，避免 swap
  #
  # 映像選擇：
  #   - ghcr.io/ggerganov/llama.cpp:server-cuda  (多架構 CUDA 通用)
  #   - dustynv/llama.cpp:r38.1.0               (待 JetPack 7.x 映像釋出)
  # ──────────────────────────────────────────────────────────────────
  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server-cuda
    container_name: mic743-llama-cpp
    platform: linux/arm64
    runtime: nvidia
    restart: unless-stopped
    depends_on:
      model-init:
        condition: service_completed_successfully
    volumes:
      - mic743-model-data:/models:ro
    ports:
      - "18180:8080"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command: >
      --model /models/${MODEL_FILE:-gemma-4-e4b-it-Q4_K_M.gguf}
      --host 0.0.0.0
      --port 8080
      --ctx-size 131072
      --n-gpu-layers 99
      --threads 14
      --flash-attn
      --mlock
      --log-disable
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 90s
    networks:
      - mic743-xcloud-net
    logging: *default-logging
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ──────────────────────────────────────────────────────────────────
  # [4] vlm-webui — 即時視覺分析 WebUI（WebRTC / RealSense）
  # ──────────────────────────────────────────────────────────────────
  vlm-webui:
    build:
      context:    ./vlm-webui
      dockerfile: Dockerfile.vlm
      platforms:
        - linux/arm64
    image: xcloudvlmui-mic743-vlm-webui:latest
    container_name: mic743-vlm-webui
    restart: unless-stopped
    environment:
      <<: *llm-env
      APP_NAME: "xCloudVLMui VLM WebUI [bot-mic743]"
    depends_on:
      llama-cpp:
        condition: service_healthy
    ports:
      - "8190:8090"
    networks:
      - mic743-xcloud-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [5] backend — FastAPI 中介層 + RAG + MQTT + 模型管理
  # ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    image: xcloudvlmui-mic743-backend:latest
    container_name: mic743-backend
    restart: unless-stopped
    environment:
      <<: *llm-env
      APP_NAME:           "xCloudVLMui Platform [bot-mic743]"
      VLM_WEBUI_URL:      http://vlm-webui:8090
      DATABASE_URL:       sqlite+aiosqlite:////data/xcloudvlm.db
      CHROMA_PERSIST_DIR: /data/chroma
      ALLOWED_ORIGINS:    '["http://localhost:3200","http://localhost:8780","http://localhost"]'
      DEBUG:              "false"
      MQTT_BROKER_HOST:   mosquitto
      MQTT_BROKER_PORT:   "1883"
      MQTT_ENABLED:       "true"
      SECRET_KEY:         ${SECRET_KEY:-change-me-mic743-production}
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - mic743-backend-data:/data
      - ./backend/uploads:/app/uploads
    ports:
      - "8101:8000"
    depends_on:
      llama-cpp:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 30s
    networks:
      - mic743-xcloud-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [6] frontend — Next.js 儀表板
  # ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    image: xcloudvlmui-mic743-frontend:latest
    container_name: mic743-frontend
    restart: unless-stopped
    environment:
      - NEXTAUTH_URL=http://localhost:8780
      - NEXT_PUBLIC_API_URL=http://localhost:8780   # 瀏覽器透過 nginx (8780) 存取
      - NEXT_PUBLIC_WS_URL=                         # 空白 → camera-stream.tsx 自動推導
      - NODE_ENV=production
    env_file:
      - path: ./frontend/.env.local
        required: false
    ports:
      - "3200:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 15s
    networks:
      - mic743-xcloud-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [7] nginx — 反向代理（統一入口）
  # ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: mic743-nginx
    platform: linux/arm64
    restart: unless-stopped
    ports:
      - "8780:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s
    networks:
      - mic743-xcloud-net
    logging: *default-logging

  # ──────────────────────────────────────────────────────────────────
  # [8] cadvisor — 容器資源監控（含 Blackwell GPU 統計）
  # ──────────────────────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: mic743-cadvisor
    platform: linux/arm64
    restart: unless-stopped
    privileged: true
    ports:
      - "8191:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--housekeeping_interval=15s"
      - "--max_housekeeping_interval=20s"
      - "--event_storage_event_limit=default=0"
      - "--event_storage_age_limit=default=0"
      - "--disable_metrics=advtcp,cpuset,hugetlb,memory_numa,process,referenced_memory,resctrl,sched,tcp,udp"
      - "--store_container_labels=false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s
    networks:
      - mic743-xcloud-net
    logging: *default-logging

# ── Named Volumes（獨立於其他 bot）────────────────────────────────────
volumes:
  mic743-model-data:
    driver: local
  mic743-backend-data:
    driver: local
  mic743-mosquitto-data:
    driver: local
  mic743-mosquitto-log:
    driver: local

# ── Network（獨立隔離）────────────────────────────────────────────────
networks:
  mic743-xcloud-net:
    name: mic743-xcloud-net
    driver: bridge
